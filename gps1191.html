<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🆘 구조요청 GPS</title>

<!-- 카카오 지도 API -->
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=ff9e145029506d6e4c72d1f2b01ea424&libraries=services"></script>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    padding-bottom: 140px;
}
h1, h2, h4, h5 { text-align: center; }

button {
    padding: 12px 18px;
    font-size: 16px;
    margin: 6px;
}

.box {
    border: 1px solid #ccc;
    padding: 30px;
    margin-top: 10px;
    background: #f0f0f0;
    border-radius: 15px;
    font-weight: bold;
}

.guide {
    margin-top: 15px;
    padding: 12px;
    background: #e8f5e9;
    border: 1px solid #2DB400;
    border-radius: 6px;
    font-size: 14px;
}

.map {
    width: 100%;
    height: 350px;
    margin-top: 10px;
    border: 1px solid #ccc;
}

/* 하단 고정 */
.bottom-fixed {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #2DB400;
    padding: 12px;
    text-align: center;
    z-index: 1000;
}
.bottom-fixed button {
    background: white;
    color: #2DB400;
    border: none;
    border-radius: 6px;
    font-size: 17px;
    font-weight: bold;
    width: 90%;
    max-width: 420px;
}

/* 🔴 대상 좌표 입력창 대형화 */
.coord-input {
    width: 90%;
    height: 30px;
    font-size: 15px;
    padding: 10px 12px;
    margin: 8px 0 16px 0;
    border: 3px solid #2DB400;
    border-radius: 8px;
}
</style>
</head>

<body>

<h4>[ 무등산국립공원특수구조대 ]</h4>
<h1>🆘 산악사고 위치파악</h1>

<h5>
1. 내위치 확인<br>
2. 내위치 공유<br>
3. 구조대 공유
</h5>

<hr>

<div style="text-align:center;">
    <button id="getLocation">📍 내 위치 확인</button>
    <button id="shareCoords">📤 내 위치 공유</button>
</div>

<div class="box" id="coord"> </div>

<div class="guide">
🟢 구조대 공유 → 메시지 / 카카오톡으로 전송
🟢 요구조자 위치좌표 위도·경도 입력<br>
🟢 대상 위치 지도에 위치 표시됨<br>
🟢 하단 요구조자 위치 경로 따라가기 클릭<br>
🟢 카카오지도 열림 → 경로 따라가기  끝.
    
</div>
    
</div>

<!-- 하단 고정 -->
<div class="bottom-fixed">
    <button id="kakaoRoute">🧭 요구조자 위치 경로 따라가기</button>
</div>

<hr>

<h2>🌐 요구조자 위치좌표 입력</h2>

<label>대상 위도:</label><br>
<input type="number" step="any" inputmode="decimal"
       id="otherLatitude" class="coord-input"><br>

<label>대상 경도:</label><br>
<input type="number" step="any" inputmode="decimal"
       id="otherLongitude" class="coord-input"><br>

<button onclick="showLocations()">📍 대상 위치 지도 보기</button>

<div id="distanceInfo" class="box"></div>
<div id="mapComparison" class="map"></div>

<script>
let currentLat, currentLng;
let targetLat, targetLng;

/* 내 위치 */
document.getElementById('getLocation').onclick = () => {
    navigator.geolocation.getCurrentPosition(pos => {
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
       
        const coordBox = document.getElementById('coord');
        coordBox.textContent = `${currentLat} / ${currentLng}`;
        coordBox.style.fontSize = "30px";   // ← 여기서 변경
        coordBox.style.fontWeight = "bold";
    }, () => alert("위치 정보를 불러올 수 없습니다."));
};

/* 📤 내 위치 공유 */
document.getElementById('shareCoords').onclick = () => {
    if (!currentLat || !currentLng) {
        alert("위치를 먼저 확인하세요.");
        return;
    }

    const kakaoMapLink =
        `https://map.kakao.com/link/map/${currentLat},${currentLng}`;

    const shareMessage = `🚨 [구조요청] 요구조자 현위치

📍 위도: ${currentLat}
📍 경도: ${currentLng}

🗺 지도 링크
카카오맵: ${kakaoMapLink}

☎️ 전화 통화 시 위도·경도를 그대로 읽어주세요.`;

    if (navigator.share) {
        navigator.share({
            title: "[구조요청] GPS 좌표 공유",
            text: shareMessage
        }).catch(() => {});
    } else {
        navigator.clipboard.writeText(shareMessage);
        alert("공유 미지원 → 좌표가 클립보드에 복사되었습니다.");
    }
};

/* 카카오맵 도착지 → 대상 위치 */
document.getElementById('kakaoRoute').onclick = () => {
    if (!targetLat || !targetLng) {
        alert("대상 위치를 먼저 지도에 표시하세요.");
        return;
    }

    location.href =
        `kakaomap://route?ep=${targetLat},${targetLng}&by=FOOT`;
};

/* 대상 위치 지도 + 거리 */
function showLocations() {
    targetLat = parseFloat(document.getElementById('otherLatitude').value);
    targetLng = parseFloat(document.getElementById('otherLongitude').value);

    if (!currentLat || !currentLng || isNaN(targetLat) || isNaN(targetLng)) {
        alert("좌표를 모두 정확히 입력하세요.");
        return;
    }

    const container = document.getElementById('mapComparison');
    const map = new kakao.maps.Map(container, {
        center: new kakao.maps.LatLng(targetLat, targetLng),
        level: 7
    });

    const myPos = new kakao.maps.LatLng(currentLat, currentLng);
    const otherPos = new kakao.maps.LatLng(targetLat, targetLng);

    new kakao.maps.Marker({ position: myPos, map });
    new kakao.maps.Marker({ position: otherPos, map });

    const polyline = new kakao.maps.Polyline({
        path: [myPos, otherPos]
    });

    const distance = polyline.getLength();
    document.getElementById('distanceInfo').textContent =
        `두 위치 간 직선거리: ${(distance / 1000).toFixed(2)} km`;
}
</script>

</body>
</html>
