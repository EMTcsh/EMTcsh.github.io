<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚑 무등산 산악사고 기록</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Kakao Map SDK -->
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=ff9e145029506d6e4c72d1f2b01ea424&libraries=services"></script>

<style>
/* 전체 배경 */
body{
  background:#eef1f5;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  transition:background 0.3s;
}

/* 🚨 중증 점멸 */
@keyframes criticalFlash{
  0%{background-color:#fee2e2;}
  50%{background-color:#dc2626;}
  100%{background-color:#fee2e2;}
}
.critical-mode{
  animation:criticalFlash 0.8s infinite;
}

/* 카드 */
.card{
  background:#fff;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  border-left:5px solid #2563eb;
}
.card h2{
  font-weight:700;
  font-size:15px;
  margin-bottom:10px;
  color:#1e3a8a;
}

/* 입력폼 */
input,select,textarea{
  width:100%;
  border:1px solid #d1d5db;
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
  font-size:15px;
  background:#f9fafb;
}
input:focus,select:focus,textarea:focus{
  outline:none;
  border-color:#2563eb;
  background:#fff;
  box-shadow:0 0 0 2px rgba(37,99,235,0.15);
}
textarea{min-height:100px;}

/* 버튼 */
button{
  width:100%;
  padding:14px;
  border-radius:12px;
  font-size:16px;
  font-weight:600;
}

/* 좌표 박스 */
.coordinate-box{
  background:#e0e7ff;
  padding:10px;
  border-radius:8px;
  font-size:13px;
  margin-bottom:8px;
}

/* 지도 */
#map{
  width:100%;
  height:220px;
  border-radius:12px;
}

/* 기록보드 */
.board-item{
  white-space:pre-line;
  font-size:13px;
  background:#f3f4f6;
  padding:12px;
  border-radius:10px;
  line-height:1.5;
}

/* 헤더 */
.header{
  text-align:center;
  font-weight:800;
  font-size:20px;
  margin:18px 0;
  color:#1d4ed8;
}
</style>
</head>
<body id="mainBody">

<div class="container mx-auto max-w-2xl p-4">

  <h1 class="header">🚑 무등산 산악사고 기록</h1>

  <form id="recordForm">

    <!-- 현장정보 -->
    <div class="card">
      <h2>현장도착</h2>
      <input type="datetime-local" name="도착시간" required>
      <input type="text" name="사고장소" placeholder="사고장소" required>
      <input type="text" name="주증상" placeholder="환자 증상" required>

      <div id="locationDisplay" class="coordinate-box">위도: , 경도:</div>
      <button type="button" id="getLocation" class="bg-green-600 text-white">🌐 현장도착 좌표</button>
      <input type="hidden" name="사고좌표" id="hiddenCoordinate">
      <div id="map"></div>
    </div>

    <!-- 의식평가 GCS -->
    <div class="card">
      <h2>의식평가(GCS)</h2>

      <select id="eye">
<option value="4">자발적으로 눈을 뜬다</option>
<option value="3">말로 지시했을때 눈을 뜬다</option>
<option value="2">통증 자극에 의해 눈을 뜬다</option>
<option value="1">어떠한 자극에도 눈을 뜨지 못한다</option>
      </select>

      <select id="verbal">
<option value="5">정확한 반응(6하원칙에 지남력 있는 상태)</option>
<option value="4">대화 혼란(대화가능하나, 계속적 대화 교환 안됨)</option>
<option value="3">언어혼란(동문서답, 혼란된 말을 함)</option>
<option value="2">이해 할수 없는 소리(신음소리만)</option>
<option value="1">반응이 없음(아무런 소리를 내지 않음)</option>
      </select>

      <select id="motor">
<option value="6">명령에 따름(간단한 명령에 따라 운동기능 수행)</option>
<option value="5">통증 자극 국소화 반응(명령은 따지 않지만, 자극을 가하면 피하거나 치우려고 함) </option>
<option value="4">통증 자극 움츠림(통증 자극을 피하려고 함, 치우려고 하지는 않음)</option>
<option value="3">통증 자극 이상굴곡(통증 자극에 앞으로 구부리거나 몸쪽으로 접음)</option>
<option value="2">통증 자극 이상신전(통증 자극에 뒤로 젖히거나 모에서 멀리 뻗음)(</option>
<option value="1">전혀 움직이지 않음(무반응, 자가호흡 없음)</option>
      </select>

      <div class="mt-2">
        <strong>GCS 결과:</strong>
        <span id="gcsResult"></span>
      </div>
      <div id="gcsWarning" style="display:none; color:#dc2626; font-weight:bold; margin-top:8px;">
        ⚠️ 중증 환자! 즉시 기도와 호흡 확인!
      </div>
    </div>

    <!-- 환자정보 -->
    <div class="card">
      <h2>환자정보</h2>
      <input type="text" name="환자이름" placeholder="이름" required>
      <input type="date" name="생년월일" required>
      <input type="text" name="거주지" placeholder="거주지" required>
      <input type="tel" name="연락처" placeholder="연락처 (010-1234-5678)" required>
    </div>

    <!-- 응급처치 -->
    <div class="card">
      <h2>응급처치</h2>
      <textarea name="응급처치" placeholder="처치 내용"></textarea>
    </div>

    <!-- 출동대원 정보 -->
    <div class="card">
      <h2>출동대원 정보</h2>
      <input type="text" name="출동대원" placeholder="출동대원 이름" required>
    </div>
    
    <button type="submit" class="bg-blue-600 text-white mt-2">기록 저장 및 공유</button>

  </form>

  <!-- 작성 기록 -->
  <div class="card">
    <h2>작성기록</h2>
    <div id="savedData"></div>
  </div>

</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxm_oLeGMIGh5PRokCURztVx6-1Ijug2KtuGbsFH-cZVOKE5LgaKDnLbTgFl2sWWDdkwA/exec";

// 🔊 중증 음성
let voiceInterval = null;
function speakCritical(){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance("중증 환자입니다. 즉시 기도와 호흡을 확인하십시오.");
  msg.lang="ko-KR";
  speechSynthesis.speak(msg);
}

// 🚨 반복 시작
function startCriticalAlert(){
  if(voiceInterval) return;
  speakCritical();
  voiceInterval = setInterval(speakCritical, 10000);
}

// 🛑 반복 중단
function stopCriticalAlert(){
  if(voiceInterval){ clearInterval(voiceInterval); voiceInterval=null; }
  speechSynthesis.cancel();
}

// 🧠 GCS 계산 및 경고
function calculateGCS(){
  const eye=parseInt(document.getElementById("eye").value);
  const verbal=parseInt(document.getElementById("verbal").value);
  const motor=parseInt(document.getElementById("motor").value);
  const total=eye+verbal+motor;

  let state='', color='';
  if (total === 15) { state = '정상-Normal'; color = '#2563eb'; } 
  else if(total>=13){ state='경도-Mild'; color='#16a34a'; }
  else if(total>=9){ state='중등도-Moderate'; color='#f59e0b'; }
  else if(total>=4){ state='중증-Severe'; color='#dc2626'; }
  else{ state='혼수'; color='#000'; }

  const gcsResult=document.getElementById("gcsResult");
  gcsResult.textContent=`${total}점 (${state})`;
  gcsResult.style.color=color;

  const gcsWarning=document.getElementById("gcsWarning");
  if(total<=8){
    if(gcsWarning) gcsWarning.style.display="block";
    document.body.classList.add("critical-mode");
    if(navigator.vibrate){ navigator.vibrate([500,300,500]); }
    startCriticalAlert();
  }else{
    if(gcsWarning) gcsWarning.style.display="none";
    document.body.classList.remove("critical-mode");
    stopCriticalAlert();
  }
}

["eye","verbal","motor"].forEach(id=>{
  document.getElementById(id).addEventListener("change", calculateGCS);
});
calculateGCS();

// GPS
document.getElementById("getLocation").onclick = ()=>{
  navigator.geolocation.getCurrentPosition(p=>{
    const lat=p.coords.latitude;
    const lng=p.coords.longitude;
    const txt=`위도:${lat}, 경도:${lng}`;
    document.getElementById("locationDisplay").textContent=txt;
    document.getElementById("hiddenCoordinate").value=txt;

    const loc = new kakao.maps.LatLng(lat,lng);
    const map = new kakao.maps.Map(document.getElementById("map"), {center:loc, level:3});
    new kakao.maps.Marker({position:loc,map:map});
  });
};

// 기록 저장 + 공유
document.getElementById("recordForm").onsubmit = async e=>{
  e.preventDefault();
  let data={}, text="";
  new FormData(e.target).forEach((v,k)=>{ data[k]=v; text+=`${k}: ${v}\n`; });
  data["GCS"]=document.getElementById("gcsResult").textContent;
  text+=`GCS: ${data["GCS"]}`;

  document.getElementById("savedData").innerHTML=`<div class="board-item">${text}</div>`;

  // 다운로드
  const blob=new Blob([text],{type:"text/plain"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="무등산_환자기록.txt";
  a.click();

  // 구글 스프레드시트 전송
  fetch(GOOGLE_SCRIPT_URL,{method:"POST",body:JSON.stringify(data)}).catch(()=>{});

  // Web Share
  if(navigator.share){
    navigator.share({title:"무등산 산악사고 기록", text:text});
  }
};
</script>
</body>
</html>
