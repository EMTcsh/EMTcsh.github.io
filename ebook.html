<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlipBook PDF Viewer</title>

<!-- PDF.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
height:100vh;
display:flex;
flex-direction:column;
background:#2b2b2b;
}

/* TOP BAR */
.toolbar{
height:60px;
background:#111;
color:#fff;
display:flex;
align-items:center;
gap:10px;
padding:10px;
}

button{
padding:6px 10px;
cursor:pointer;
}

/* MAIN */
.main{
flex:1;
display:flex;
overflow:hidden;
}

/* THUMBS */
.sidebar{
width:160px;
background:#1e1e1e;
overflow:auto;
padding:5px;
}

.thumb{
margin-bottom:10px;
cursor:pointer;
}

.thumb canvas{
width:100%;
border:1px solid #444;
}

/* BOOK AREA */
.viewer{
flex:1;
display:flex;
justify-content:center;
align-items:center;
perspective:2000px;
}

/* PAGE FLIP STYLE */
.page{
width:70%;
max-width:700px;
height:90%;
background:white;
box-shadow:0 20px 40px rgba(0,0,0,.4);
transform-origin:left;
transition:transform .7s ease;
position:absolute;
overflow:hidden;
}

.page.flipped{
transform:rotateY(-180deg);
}

/* CANVAS */
canvas{
width:100%;
height:100%;
}

/* BOOK CONTAINER */
.book{
position:relative;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}
</style>
</head>

<body>

<div class="toolbar">

<input type="file" id="file" accept="application/pdf">

<button onclick="prevPage()">◀</button>
<button onclick="nextPage()">▶</button>

<span id="info">0 / 0</span>

<button onclick="saveBookmark()">북마크</button>
<button onclick="loadBookmark()">이동</button>

</div>

<div class="main">

<div class="sidebar" id="thumbs"></div>

<div class="viewer">

<div class="book" id="book">
</div>

</div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.js";

let pdfDoc = null;
let currentPage = 1;
let totalPages = 0;

const book = document.getElementById("book");

/* LOAD PDF */
document.getElementById("file")
.addEventListener("change", async (e)=>{

const file = e.target.files[0];
if(!file) return;

const data = await file.arrayBuffer();

pdfDoc = await pdfjsLib.getDocument({data}).promise;

totalPages = pdfDoc.numPages;
currentPage = 1;

renderPage(currentPage);
renderThumbs();

});

/* RENDER SINGLE PAGE */
async function renderPage(num){

book.innerHTML = "";

const page = await pdfDoc.getPage(num);

const viewport = page.getViewport({scale:1.5});

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext:ctx,
viewport
}).promise;

const pageDiv = document.createElement("div");
pageDiv.className = "page";
pageDiv.appendChild(canvas);

book.appendChild(pageDiv);

document.getElementById("info")
.innerText = `${num} / ${totalPages}`;

}

/* NEXT / PREV */
function nextPage(){
if(currentPage < totalPages){
currentPage++;
animateFlip("next");
renderPage(currentPage);
}
}

function prevPage(){
if(currentPage > 1){
currentPage--;
animateFlip("prev");
renderPage(currentPage);
}
}

/* SIMPLE FLIP EFFECT */
function animateFlip(dir){
const page = document.querySelector(".page");
if(!page) return;

page.style.transform =
dir === "next"
? "rotateY(-180deg)"
: "rotateY(180deg)";

setTimeout(()=>{
page.style.transform = "rotateY(0deg)";
},400);
}

/* THUMBNAILS */
async function renderThumbs(){

const thumbs = document.getElementById("thumbs");
thumbs.innerHTML = "";

for(let i=1;i<=totalPages;i++){

const page = await pdfDoc.getPage(i);

const viewport = page.getViewport({scale:0.2});

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext:ctx,
viewport
}).promise;

const div = document.createElement("div");
div.className = "thumb";

div.onclick = ()=>{
currentPage = i;
renderPage(i);
};

div.appendChild(canvas);
thumbs.appendChild(div);
}

}

/* BOOKMARK */
function saveBookmark(){
localStorage.setItem("bookmark", currentPage);
alert("북마크 저장: " + currentPage);
}

function loadBookmark(){
const p = localStorage.getItem("bookmark");
if(p){
currentPage = Number(p);
renderPage(currentPage);
}
}

</script>

</body>
</html>
