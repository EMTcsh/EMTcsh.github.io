<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stable PDF FlipBook</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.6.82/pdf.min.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
height:100vh;
display:flex;
flex-direction:column;
background:#2b2b2b;
}

/* TOOLBAR */
.toolbar{
height:60px;
background:#111;
color:#fff;
display:flex;
align-items:center;
gap:10px;
padding:10px;
}

button{
padding:6px 10px;
cursor:pointer;
}

/* MAIN */
.main{
flex:1;
display:flex;
overflow:hidden;
}

/* THUMB PANEL */
.sidebar{
width:160px;
background:#1e1e1e;
overflow:auto;
padding:5px;
}

.thumb{
margin-bottom:10px;
cursor:pointer;
}

.thumb canvas{
width:100%;
border:1px solid #444;
}

/* VIEWER */
.viewer{
flex:1;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* PAGE */
.page{
background:white;
box-shadow:0 20px 40px rgba(0,0,0,.4);
transition:transform .6s ease;
transform-origin:center;
}

canvas{
display:block;
}

/* loading */
#loading{
position:absolute;
color:white;
font-size:18px;
display:none;
}
</style>
</head>

<body>

<div class="toolbar">

<input type="file" id="file" accept="application/pdf">

<button onclick="prevPage()">◀</button>
<button onclick="nextPage()">▶</button>

<span id="info">0 / 0</span>

<button onclick="saveBookmark()">북마크</button>
<button onclick="loadBookmark()">이동</button>

</div>

<div class="main">

<div class="sidebar" id="thumbs"></div>

<div class="viewer">

<div id="loading">Loading...</div>
<div class="page" id="page"></div>

</div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.6.82/pdf.worker.min.js";

let pdfDoc = null;
let currentPage = 1;
let totalPages = 0;

const pageDiv = document.getElementById("page");
const loading = document.getElementById("loading");

const pageCache = {}; // ⭐ 핵심 캐시

/* PDF LOAD */
document.getElementById("file")
.addEventListener("change", async (e)=>{

const file = e.target.files[0];
if(!file) return;

const data = await file.arrayBuffer();

loading.style.display = "block";

const loadingTask = pdfjsLib.getDocument({data});

pdfDoc = await loadingTask.promise;

totalPages = pdfDoc.numPages;
currentPage = 1;

loading.style.display = "none";

renderPage(currentPage);
renderThumbs();

});

/* RENDER PAGE (OPTIMIZED) */
async function renderPage(num){

if(pageCache[num]){
pageDiv.innerHTML = pageCache[num];
document.getElementById("info").innerText =
`${num} / ${totalPages}`;
return;
}

loading.style.display = "block";

const page = await pdfDoc.getPage(num);

/* 🔥 중요: scale 줄임 (100MB 대응) */
const viewport = page.getViewport({scale:1.0});

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext:ctx,
viewport
}).promise;

pageDiv.innerHTML = "";
pageDiv.appendChild(canvas);

/* cache */
pageCache[num] = pageDiv.innerHTML;

document.getElementById("info").innerText =
`${num} / ${totalPages}`;

loading.style.display = "none";

}

/* NEXT */
function nextPage(){
if(currentPage < totalPages){
currentPage++;
flipAnim();
renderPage(currentPage);
}
}

/* PREV */
function prevPage(){
if(currentPage > 1){
currentPage--;
flipAnim();
renderPage(currentPage);
}
}

/* SIMPLE FLIP EFFECT */
function flipAnim(){
pageDiv.style.transform = "rotateY(-180deg)";
setTimeout(()=>{
pageDiv.style.transform = "rotateY(0deg)";
},300);
}

/* THUMBNAILS (LIMITED - 중요) */
async function renderThumbs(){

const thumbs = document.getElementById("thumbs");
thumbs.innerHTML = "";

/* ⭐ 100MB 대응: 최대 50페이지 제한 */
const limit = Math.min(totalPages, 50);

for(let i=1;i<=limit;i++){

const page = await pdfDoc.getPage(i);

const viewport = page.getViewport({scale:0.2});

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext:ctx,
viewport
}).promise;

const div = document.createElement("div");
div.className = "thumb";

div.onclick = ()=>{
currentPage = i;
renderPage(i);
};

div.appendChild(canvas);
thumbs.appendChild(div);

}

}

/* BOOKMARK */
function saveBookmark(){
localStorage.setItem("bookmark", currentPage);
alert("북마크 저장: " + currentPage);
}

function loadBookmark(){
const p = localStorage.getItem("bookmark");
if(p){
currentPage = Number(p);
renderPage(currentPage);
}
}

/* KEYBOARD */
document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowRight") nextPage();
if(e.key==="ArrowLeft") prevPage();
});

</script>

</body>
</html>
